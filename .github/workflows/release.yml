name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd src
          npm install
          if [ -d "ui" ]; then
            cd ui
            npm install
            cd ..
          fi

      - name: Update Rust dependencies
        shell: bash
        run: |
          if [ -d "src/src-tauri" ]; then
            cd src/src-tauri
            cargo update
          elif [ -d "src-tauri" ]; then
            cd src-tauri
            cargo update
          fi

      - name: Generate application icons
        run: |
          cd src
          npx @tauri-apps/cli@^2.0.0 icon ../images/logo-background.png

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
         
          projectPath: './src/src-tauri'
          tagName: ${{ github.ref_name }}
          releaseName: 'Aurora Terminal ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false